allow-lan: false
clash-for-android:
  append-system-dns: false
disable-keep-alive: false
dns:
  cache-algorithm: arc
  default-nameserver:
  - quic://223.5.5.5#DIRECT
  - https://1.12.12.12/dns-query#DIRECT&h3=false
  enable: true
  enhanced-mode: fake-ip
  fake-ip-filter:
  - '*.lan'
  - '*.local'
