  ipv6: false
  ipv6-timeout: 90
  nameserver:
  - quic://223.5.5.5#DIRECT
  - https://1.12.12.12/dns-query#DIRECT&h3=false
  nameserver-policy:
    +.googleapis.cn:
    - https://8.8.8.8/dns-query#PROXY&h3=false
    - https://8.8.4.4/dns-query#PROXY&h3=false
    +.openwrt.ai,+.mwm.moe,+.lizi.moe,+.alcy.cc:
    - quic://223.5.5.5#DIRECT
    - https://1.12.12.12/dns-query#DIRECT&h3=false
  prefer-h3: false
  proxy-server-nameserver:
  - quic://223.5.5.5
  - https://1.12.12.12/dns-query
  respect-rules: false
  use-hosts: false
  use-system-hosts: false
find-process-mode: strict
geo-auto-update: true
geo-update-interval: 12
geodata-loader: memconservative
geodata-mode: true
geosite-matcher: mph
global-client-fingerprint: safari
global-ua: clash.meta/mihomo
inbound-mptcp: true
inbound-tfo: true
ipv6: true
keep-alive-idle: 15
