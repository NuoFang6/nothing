- MATCH,PROXY
sniffer:
  enable: true
  force-dns-mapping: false
  force-domain:
  - +.netflix.com
  - +.nflxvideo.net
  - +.amazonaws.com
  - +.media.dssott.com
  override-destination: true
  parse-pure-ip: true
  skip-domain:
  - +.apple.com
  - +.io.mi.com
  - +.cdn-telegram.org
  - +.telegram.org
  - +.telegram-cdn.org
  - +.fragment.com
  - +.t.me
  - +.telegra.ph
  sniff:
    HTTP:
      ports:
      - 80
      - 8080
    QUIC:
      ports:
      - 443
      - 8443
    TLS:
      ports:
      - 443
      - 8443
tcp-concurrent: true
tun:
  auto-detect-interface: true
  auto-route: true
  dns-hijack:
  - any:53
  stack: system
  strict-route: true
unified-delay: true
