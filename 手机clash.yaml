inbound-tfo: true
inbound-mptcp: true
ipv6: true
geodata-mode: true
geosite-matcher: mph
geodata-loader: memconservative
find-process-mode: off
keep-alive-interval: 1800
global-client-fingerprint: random
tcp-concurrent: true
unified-delay: true
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: https://mirror.ghproxy.com/https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat
  geosite: https://mirror.ghproxy.com/https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat
profile:
  store-selected: true
  store-fake-ip: true
dns:
  enable: true
  ipv6: true
  use-hosts: false
  prefer-h3: false
  cache-algorithm: arc
  enhanced-mode: fake-ip
  default-nameserver:
    - quic://223.5.5.5#DIRECT
    - quic://223.6.6.6#DIRECT
  nameserver:
    - quic://dns.alidns.com#DIRECT
  proxy-server-nameserver:
    - quic://dns.alidns.com
  fallback:
    - https://dns.google/dns-query#PROXY&h3=false
  nameserver-policy:
    "+.openwrt.ai":
      - quic://dns.alidns.com#DIRECT
    "+.msftconnecttest.com,+.msftncsi.com,+.bing.com,+.googleapis.cn":
      - https://dns.google/dns-query#PROXY&h3=false
  fallback-filter:
    geoip: false
    geoip-code: CN
    ipcidr:
      - 0.0.0.0/8
      - 10.0.0.0/8
      - 100.64.0.0/10
      - 127.0.0.0/8
      - 169.254.0.0/16
      - 172.16.0.0/12
      - 192.0.0.0/24
      - 192.0.2.0/24
      - 192.88.99.0/24
      - 192.168.0.0/16
      - 198.18.0.0/15
      - 198.51.100.0/24
      - 203.0.113.0/24
      - 224.0.0.0/4
      - 240.0.0.0/4
      - 255.255.255.255/32
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - localhost.ptlogin2.qq.com

sniffer:
  enable: true
  force-dns-mapping: false
  parse-pure-ip: true
  force-domain:
    - +.netflix.com
    - +.nflxvideo.net
    - +.amazonaws.com
    - +.media.dssott.com
  skip-domain:
    - "+.bing.com"
    - "+.copilot.microsoft.com"
    - "+.apple.com"
    - "+.io.mi.com"
    - "+.cdn-telegram.org"
    - "+.telegram.org"
    - "+.telegram-cdn.org"
    - "+.fragment.com"
    - "+.t.me"
    - "+.telegra.ph"
  sniff:
    HTTP:
      ports:
        - 80
        - 8080
        - 8880
        - 8088
        - 8888
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  override-destination: true

