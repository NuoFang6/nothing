proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - 自动选择
    include-all: true

    lazy: true
    url: https://www.youtube.com/generate_204
    interval: 300
    timeout: 4000
    expected-status: 204
    max-failed-times: 2

  - name: 自动选择
    type: select
    include-all: true

    lazy: true
    url: https://www.youtube.com/generate_204
    interval: 300
    timeout: 4000
    tolerance: 35
    expected-status: 204
    max-failed-times: 2

rule-providers:
  AdRules:
    type: http
    path: ./AdRules.txt
    url: https://adrules.top/adrules_domainset.txt
    interval: 86400
    proxy: DIRECT
    behavior: domain
    format: text

