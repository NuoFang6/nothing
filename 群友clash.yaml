proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - 🚀极速
      - ✨均衡
      - 🔰低延迟
      - ⚠️请不要分享订阅!
    <<: *groupsSet
    include-all: true

  - name: "🚀极速"
    type: url-test
    <<: *groupsSet
    proxies:
      - 👍|cf-自动优选-CMLiussss
      - 👍|cf-自动优选-小一
      - 👍|cf-ipv6自动优选
      - 👍|pac-hy2-1
    use:
      - 散线
      - LanCloud
    # hidden: true

  - name: "✨均衡"
    type: load-balance
    strategy: round-robin
    <<: *groupsSet
    include-all: true
    disable-udp: true
    filter: "(自动优选)"

  - name: "🔰低延迟"
    type: url-test
    <<: *groupsSet
    include-all: true
    hidden: true

  - name: ⚠️请不要分享订阅!
    type: select
    proxies:
      - REJECT
    lazy: true
    hidden: true

