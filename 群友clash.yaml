rules:
  # bug缓解，分流部分情况泄露的DNS
  - IP-CIDR,223.5.5.5/32,DIRECT,no-resolve
  - IP-CIDR,223.6.6.6/32,DIRECT,no-resolve
  # 特殊APP
  - SUB-RULE,(PROCESS-NAME-REGEX,^com\.),app规则
  - PROCESS-NAME,info.muge.appshare,DIRECT # AppShare 防止广告展示率下降
  # 已三网优化的cf域名
  - DOMAIN-SUFFIX,090227.xyz,DIRECT
  - DOMAIN-SUFFIX,nuofang.us.kg,DIRECT
  # 一直循环请求
  - DOMAIN-SUFFIX,aeventlog.beacon.qq.com,DIRECT # 傻逼 QQ 连不上一直重试
  # - DOMAIN-SUFFIX,browser-intake-datadoghq.com,REJECT-DROP
  # - DOMAIN-SUFFIX,dataflow.biliapi.com,REJECT-DROP
  # 不屏蔽广告
  - SUB-RULE,(DOMAIN-REGEX,(chatgpt|openai|sentry-cdn)),PROXY-noUDP # ChatGPT 可能卡住，sentry-cdn为误屏蔽
  - DOMAIN-KEYWORD,packetlosstest,PROXY # UDP 测试网站
  - DOMAIN-SUFFIX,speed.cloudflare.com,PROXY # cloudflare 测速
  - DOMAIN-SUFFIX,sentry.io,DIRECT #应用分析
  - DOMAIN-SUFFIX,pendo.io,DIRECT #! 疑似病毒网站
  # 拒绝广告
  - RULE-SET,Ad,REJECT
  - DST-PORT,853,REJECT # 阻止 DoT-DNS 绕过，53端口已被 dns-hijack 处理
  # - OR,((DST-PORT,53),(DST-PORT,853)),REJECT # 阻止 DNS 绕过
  # - RULE-SET,DoH,REJECT # 防止 DoH DNS 绕过
  # - RULE-SET,tif,REJECT # 威胁网址拦截
  # - IP-CIDR6,2620:1ec::/32,REJECT,no-resolve # 疑似 edge 绕过 DNS
  # 白名单-直连
  - DOMAIN-REGEX,(ubisoft|icve|zhihuishu|shouqianba|lagrange|jsdmirror|msftncsi|msftconnecttest|lenovomm|beqege|viayoo),DIRECT
  - DOMAIN-REGEX,^.*\.(mwm\.moe|lizi\.moe|alcy\.cc|openwrt\.ai|codelife\.cc)$,DIRECT
  - DOMAIN-SUFFIX,googleapis.cn,DIRECT # Google 国内
  - DOMAIN-SUFFIX,xn--ngstr-lra8j.com,DIRECT # Google 应用下载，需和 googleapis 同时分流
  - DOMAIN-SUFFIX,xn--ngstr-cn-8za9o.com,DIRECT # Google 国内应用下载，未推广
  # 黑名单-代理
  - SUB-RULE,(DOMAIN-REGEX,(gstatic|googleapis|jsdelivr|cloudflare)),PROXY-noUDP
  - DOMAIN-SUFFIX,test-ipv6.com,PROXY
  # 直连-域名集
  - RULE-SET,cn,DIRECT # 包含 cn、steam@cn、microsoft@cn、google@cn、win-update
  # 直连-IP集
  - DST-PORT,7680,DIRECT # win优化传递
  - RULE-SET,cnIP,DIRECT,no-resolve # 包含内网
  ## 拒绝使用 QUIC 访问网页
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
  # 代理-IP集
  - RULE-SET,telegram,PROXY,no-resolve
  # 未匹配到-代理
  - MATCH,PROXY

  # 备用
  # - PROCESS-NAME-REGEX,(mihomo|(?=.*clash)(?=.*meta)),DIRECT

sub-rules:
  app规则:
    - PROCESS-NAME,com.tencent.mm,DIRECT # 微信
    - PROCESS-NAME,com.eg.android.AlipayGphone,DIRECT # 支付宝
    - PROCESS-NAME,com.tencent.wemeet.app,DIRECT # 腾讯会议
    - PROCESS-NAME,com.MobileTicket,DIRECT # 铁路12306
    - PROCESS-NAME,com.able.wisdomtree,DIRECT # 智慧树知到
    - PROCESS-NAME,com.whaty.qyZHZJ,DIRECT # 智慧职教
    - PROCESS-NAME,com.supwisdom.jvtc,DIRECT # 慧通江职
    - PROCESS-NAME,com.icbc,DIRECT # 工商银行
    - PROCESS-NAME,com.unionpay.tsmservice.mi,DIRECT # 银联安全组件
    - PROCESS-NAME,com.openai.chatgpt,PROXY # ChatGPT
    # - PROCESS-NAME,com.jxnxs.mobile.bank,DIRECT # 江西农商
  PROXY-noUDP:
    - NETWORK,UDP,REJECT
    - MATCH,PROXY

