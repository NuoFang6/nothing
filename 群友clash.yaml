mode: rule
log-level: warning
ipv6: true
allow-lan: false
inbound-tfo: true
inbound-mptcp: true
geodata-mode: true
geosite-matcher: mph
geodata-loader: memconservative
find-process-mode: strict
disable-keep-alive: false #目前在android端强制为true
keep-alive-idle: 15
keep-alive-interval: 15
global-client-fingerprint: chrome
global-ua: "clash.meta/mihomo"
tcp-concurrent: true
unified-delay: true
geo-auto-update: true
geo-update-interval: 12
# external-doh-server: /dns-query # 在RESTful API端口上开启DOH服务器，该URL不会验证secret
external-controller: 127.0.0.1:9090 # RESTful API 监听地址
secret: "@NuoFang" # 外部控制器RESTful API访问密钥
# WEB UI 目录，使用 http://127.0.0.1:9090/ui 访问
external-ui: ./ui/
external-ui-name: xd
external-ui-url: "https://mirror.ghproxy.com/https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

geox-url:
  geosite: https://mirror.ghproxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
  geoip: https://mirror.ghproxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat

clash-for-android:
  append-system-dns: false

profile:
  store-selected: true
  store-fake-ip: true

tun:
  stack: system
  auto-route: true
  auto-detect-interface: true
  endpoint-independent-nat: false
  strict-route: false # 可能有bug
  dns-hijack:
    - any:53

hosts:
  time.windows.com: ntp.tencent.com
  time.nist.gov: ntp.tencent.com
  pool.ntp.org: ntp.tencent.com
  time.android.com: ntp.tencent.com

dns:
  enable: true
  ipv6: true
  ipv6-timeout: 90
  use-hosts: true
  use-system-hosts: false
  respect-rules: false
  prefer-h3: false
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - quic://223.5.5.5
    - tls://1.12.12.12
  proxy-server-nameserver:
    - quic://dns.alidns.com
    - tls://1.12.12.12
  nameserver:
    - "quic://dns.alidns.com#DIRECT"
    - "tls://1.12.12.12#DIRECT"
  fallback:
    - "tls://dns.google#PROXY"
  fallback-filter:
    geoip: false
    geoip-code: CN
    ipcidr:
      - 0.0.0.0/8
      - 10.0.0.0/8
      - 100.64.0.0/10
      - 127.0.0.0/8
      - 169.254.0.0/16
      - 172.16.0.0/12
      - 192.0.0.0/24
      - 192.0.2.0/24
      - 192.88.99.0/24
      - 192.168.0.0/16
      - 198.18.0.0/15
      - 198.51.100.0/24
      - 203.0.113.0/24
      - 224.0.0.0/4
      - 240.0.0.0/4
      - 255.255.255.255/32
  # domain:
  #   - +.googleapis.cn
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "localhost.ptlogin2.qq.com"

sniffer:
  enable: true
  parse-pure-ip: true
  override-destination: true
  force-dns-mapping: false
  force-domain:
    - +.netflix.com
    - +.nflxvideo.net
    - +.amazonaws.com
    - +.media.dssott.com
  skip-domain:
    # - "+.bing.com"
    # - "+.copilot.microsoft.com"
    - "+.apple.com"
    - "+.io.mi.com"
  sniff:
    HTTP:
      ports:
        - 80
        - 8080
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443

rules:
  # bug 缓解
  - PROCESS-NAME-REGEX,(mihomo|(?=.*clash)(?=.*meta)),DIRECT
  # 丢弃
  - DOMAIN-SUFFIX,aeventlog.beacon.qq.com,REJECT-DROP
  - DOMAIN-SUFFIX,browser-intake-datadoghq.com,REJECT-DROP
  - DOMAIN-SUFFIX,dataflow.biliapi.com,REJECT-DROP
  # 不屏蔽广告
  - DOMAIN-KEYWORD,chatgpt,PROXY # ChatGPT 卡住
  - PROCESS-NAME,info.muge.appshare,DIRECT # AppShare 防止广告展示率下降
  - DOMAIN-SUFFIX,sentry.io,DIRECT #应用分析
  # 拒绝广告
  - RULE-SET,Ad,REJECT
  # 特殊APP
  - SUB-RULE,(PROCESS-NAME-REGEX,^com\.),app规则
  # 白名单-直连
  - DOMAIN-REGEX,(ubisoft|icve|zhihuishu|shouqianba|lagrange|jsdmirror|msftncsi|msftconnecttest|heytapmobi|weibo|lenovomm|beqege),DIRECT
  - DOMAIN-REGEX,^.*\.(mwm\.moe|lizi\.moe|alcy\.cc|openwrt\.ai|codelife\.cc|qq\.com)$,DIRECT
  - DOMAIN-SUFFIX,googleapis.cn,DIRECT # Google 国内
  - DOMAIN-SUFFIX,xn--ngstr-lra8j.com,DIRECT # Google 应用下载，需和 googleapis 同时分流
  - DOMAIN-SUFFIX,xn--ngstr-cn-8za9o.com,DIRECT # Google 国内应用下载，未推广
  # 黑名单-代理
  - SUB-RULE,(DOMAIN-SUFFIX,gstatic.com),PROXY-noUDP
  - SUB-RULE,(DOMAIN-SUFFIX,googleapis.com),PROXY-noUDP
  - DOMAIN-SUFFIX,test-ipv6.com,PROXY
  # 直连-域名集
  - GEOSITE,cn,DIRECT
  - GEOSITE,steam@cn,DIRECT
  - GEOSITE,microsoft@cn,DIRECT
  - GEOSITE,google@cn,DIRECT
  - GEOSITE,win-update,DIRECT
  # 直连-IP集
  - DST-PORT,7680,DIRECT # win优化传递
  - GEOIP,private,DIRECT,no-resolve # 内网
  - GEOIP,cn,DIRECT,no-resolve
  ## 拒绝使用 QUIC 访问网页
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
  # 代理-IP集
  - GEOIP,telegram,PROXY,no-resolve
  # 未匹配到-代理
  - MATCH,PROXY
  #
  # End
  #
  # 备用
  # - IP-CIDR,223.5.5.5/32,DIRECT,no-resolve
  # - IP-CIDR,223.6.6.6/32,DIRECT,no-resolve
  # - IP-CIDR,1.12.12.12/32,DIRECT,no-resolve
  # - RULE-SET,AdRules,REJECT
  # - DOMAIN-REGEX,(tailscale|visualstudio),PROXY
  # - DOMAIN-REGEX,^.*\.(lmsys\.org|jsdelivr\.net)$,PROXY
  # - NETWORK,UDP,REJECT

sub-rules:
  app规则:
    - PROCESS-NAME,com.tencent.mm,DIRECT # 微信
    - PROCESS-NAME,com.eg.android.AlipayGphone,DIRECT # 支付宝
    - PROCESS-NAME,com.MobileTicket,DIRECT # 铁路12306
    - PROCESS-NAME,com.able.wisdomtree,DIRECT # 智慧树知到
    - PROCESS-NAME,com.whaty.qyZHZJ,DIRECT # 智慧职教
    - PROCESS-NAME,com.supwisdom.jvtc,DIRECT # 慧通江职
    - PROCESS-NAME,com.icbc,DIRECT # 工商银行
    - PROCESS-NAME,com.unionpay.tsmservice.mi,DIRECT # 银联安全组件
    - PROCESS-NAME,com.openai.chatgpt,PROXY # ChatGPT
    # - PROCESS-NAME,com.jxnxs.mobile.bank,DIRECT # 江西农商
  PROXY-noUDP:
    - NETWORK,UDP,REJECT
    - MATCH,PROXY

rule-providers:
  Ad:
    type: http
    url: https://mirror.ghproxy.com/https://github.com/NuoFang6/nothing/raw/main/mrs/ads.mrs
    format: mrs
    behavior: domain
    interval: 85000
    proxy: DIRECT

  # Ad:
  #   type: http
  #   url: https://mirror.ghproxy.com/https://github.com/TG-Twilight/AWAvenue-Ads-Rule/raw/main/Filters/AWAvenue-Ads-Rule-Clash.yaml
  #   format: yaml
  #   behavior: domain
  #   interval: 86400
  #   proxy: DIRECT

groupsSet: &groupsSet
  lazy: true
  url: https://www.youtube.com/generate_204
  interval: 600
  timeout: 1500
  tolerance: 30
  expected-status: 204
  max-failed-times: 2
  tfo: true
  mptcp: true

# 锚点
providerSet: &providerSet
  type: http
  interval: 85000
  proxy: DIRECT
  header:
    User-Agent:
      - "clash.meta/mihomo"
  health-check:
    enable: true
    url: https://www.youtube.com/generate_204
    interval: 600
    timeout: 1500
    lazy: true
    expected-status: 204
  override:
    skip-cert-verify: true
    tfo: true
    mptcp: true
    # up: 0

###  通用配置结束  ###

proxy-providers:
  CF-vless:
    <<: *providerSet
    url: "https://cfp.nuofang.dns-dynamic.net/9617f71c-737e-42c2-986d-8c6f2e00b1d5?clash"

  散线:
    <<: *providerSet
    url: "https://mirror.ghproxy.com/https://github.com/NuoFang6/nothing/raw/main/散线.txt"

  白嫖线路:
    <<: *providerSet
    url: "https://mirror.ghproxy.com/https://github.com/NuoFang6/nothing/raw/main/NoMoreWalls/list.meta.yml"

  # LanCloud:
  #   <<: *providerSet
  #   url: "https://lancloud.zichuanlan.top/api/v1/client/subscribe?token=ec318b460adb9700b4e2d68171e29ea4"

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - 🚀自动-全部
      - 🚀自动-白嫖线路
      - 📌手动-CFvless协议
      - 📌手动-白嫖线路
      - 📌手动-散线
      - 手动需在对应分组挑选线路
      - 👆请不要分享订阅！
      # - LanCloud
    <<: *groupsSet

  - name: 📌手动-CFvless协议
    type: select
    disable-udp: true
    use:
      - CF-vless
    <<: *groupsSet

  - name: 📌手动-白嫖线路
    type: select
    use:
      - 白嫖线路
    <<: *groupsSet

  - name: 📌手动-散线
    type: select
    use:
      - 散线
    <<: *groupsSet

  - name: 🚀自动-全部
    type: url-test
    include-all: true
    <<: *groupsSet

  - name: 🚀自动-白嫖线路
    type: url-test
    use:
      - 白嫖线路
    <<: *groupsSet

  - name: 👆请不要分享订阅！
    type: select
    proxies:
      - REJECT
    lazy: true
    hidden: true

  - name: 手动需在对应分组挑选线路
    type: select
    proxies:
      - REJECT
    lazy: true
    hidden: true

  # - name: LanCloud
  #   type: select
  #   use:
  #     - LanCloud
  #   <<: *groupsSet
