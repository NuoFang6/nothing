mode: rule
log-level: warning
ipv6: true
allow-lan: false
inbound-tfo: true
inbound-mptcp: true
geodata-mode: true
geosite-matcher: mph
geodata-loader: memconservative
find-process-mode: strict
disable-keep-alive: false #目前在android端强制为true
keep-alive-idle: 15
keep-alive-interval: 15
global-client-fingerprint: safari
global-ua: "clash.meta/mihomo"
tcp-concurrent: true
unified-delay: true
geo-auto-update: true
geo-update-interval: 12
# external-doh-server: /dns-query # 在RESTful API端口上开启DOH服务器
geox-url:
  geoip: https://mirror.ghproxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat
  geosite: https://mirror.ghproxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat

clash-for-android:
  append-system-dns: false

profile:
  store-selected: true
  store-fake-ip: true

tun:
  stack: system
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  dns-hijack:
    - any:53

dns:
  enable: true
  ipv6: false
  ipv6-timeout: 90
  use-hosts: false
  use-system-hosts: false
  prefer-h3: false
  respect-rules: false
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - quic://223.5.5.5#DIRECT
    - quic://223.6.6.6#DIRECT
  nameserver:
    - quic://223.5.5.5#DIRECT
    - quic://223.6.6.6#DIRECT
  proxy-server-nameserver:
    - quic://223.5.5.5
    - quic://223.6.6.6
  fallback:
    - https://8.8.8.8/dns-query#PROXY&h3=false
    - https://8.8.4.4/dns-query#PROXY&h3=false
  nameserver-policy:
    "+.openwrt.ai,+.mwm.moe,+.lizi.moe,+.alcy.cc":
      - quic://223.5.5.5#DIRECT
      - quic://223.6.6.6#DIRECT
    "+.googleapis.cn":
      - https://8.8.8.8/dns-query#PROXY&h3=false
      - https://8.8.4.4/dns-query#PROXY&h3=false
  fallback-filter:
    geoip: false
    geoip-code: CN
    ipcidr:
      - 0.0.0.0/8
      - 10.0.0.0/8
      - 100.64.0.0/10
      - 127.0.0.0/8
      - 169.254.0.0/16
      - 172.16.0.0/12
      - 192.0.0.0/24
      - 192.0.2.0/24
      - 192.88.99.0/24
      - 192.168.0.0/16
      - 198.18.0.0/15
      - 198.51.100.0/24
      - 203.0.113.0/24
      - 224.0.0.0/4
      - 240.0.0.0/4
      - 255.255.255.255/32
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - localhost.ptlogin2.qq.com

sniffer:
  enable: true
  parse-pure-ip: true
  override-destination: true
  force-dns-mapping: false
  force-domain:
    - +.netflix.com
    - +.nflxvideo.net
    - +.amazonaws.com
    - +.media.dssott.com
  skip-domain:
    # - "+.bing.com"
    # - "+.copilot.microsoft.com"
    - "+.apple.com"
    - "+.io.mi.com"
    - "+.cdn-telegram.org"
    - "+.telegram.org"
    - "+.telegram-cdn.org"
    - "+.fragment.com"
    - "+.t.me"
    - "+.telegra.ph"
  sniff:
    HTTP:
      ports:
        - 80
        - 8080
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443

rules:
  - DOMAIN-SUFFIX,aeventlog.beacon.qq.com,REJECT-DROP
  - DOMAIN-SUFFIX,browser-intake-datadoghq.com,REJECT-DROP
  - DOMAIN-SUFFIX,dataflow.biliapi.com,REJECT-DROP
  - GEOIP,private,DIRECT,no-resolve
  - GEOIP,telegram,PROXY,no-resolve
  - RULE-SET,AdRules,REJECT
  - PROCESS-NAME,com.tencent.mm,DIRECT
  - PROCESS-NAME,com.eg.android.AlipayGphone,DIRECT
  - PROCESS-NAME-REGEX,(?i)miHoYo,DIRECT
  - DOMAIN-REGEX,(ubisoft|icve|zhihuishu|shouqianba|lagrange),DIRECT
  - DOMAIN-REGEX,^.*\.(mwm\.moe|lizi\.moe|alcy\.cc|openwrt\.ai|codelife\.cc)$,DIRECT
  - DOMAIN-REGEX,(gstatic|tailscale|visualstudio|bard|gemini),PROXY
  - DOMAIN-REGEX,^.*\.(googleapis\.cn|lmsys\.org|jsdelivr\.net)$,PROXY
  - GEOSITE,win-update,DIRECT
  - GEOSITE,cn,DIRECT
  - GEOIP,cn,DIRECT,no-resolve
  - NETWORK,UDP,REJECT
  # - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
  - MATCH,PROXY

# 锚点
providerSet: &providerSet
  type: http
  interval: 86400
  proxy: DIRECT
  header:
    User-Agent:
      - "clash.meta/mihomo"
  health-check:
    enable: true
    url: https://www.youtube.com/generate_204
    interval: 600
    timeout: 1500
    lazy: true
    expected-status: 204
  override:
    skip-cert-verify: true
    tfo: true
    mptcp: true
    # up: 0

groupsSet: &groupsSet
  lazy: true
  url: https://www.youtube.com/generate_204
  interval: 600
  timeout: 1400
  expected-status: 204
  max-failed-times: 2
  tfo: true
  mptcp: true

rule-providers:
  AdRules:
    type: http
    url: https://adrules.top/adrules_domainset.txt
    format: text
    behavior: domain
    interval: 86400
    proxy: DIRECT

proxy-providers:
  CFproxy:
    <<: *providerSet
    url: "https://cfp.nuofang.dns-dynamic.net/72cd3c7f-3cb9-40ec-b81e-1ef1e65baa47?clash"
    override:
      additional-suffix: "|禁止转发|CFproxy"

  CFtrojan:
    <<: *providerSet
    url: "https://cftj.nuofang.dns-dynamic.net/nuofang?clash"
    override:
      additional-suffix: "|禁止转发|CFtrojan"

  LanCloud:
    <<: *providerSet
    url: "https://lancloud.zichuanlan.top/api/v1/client/subscribe?token=ec318b460adb9700b4e2d68171e29ea4"
    override:
      additional-suffix: "|禁止转发|LanCloud"

  散线:
    <<: *providerSet
    url: "https://mirror.ghproxy.com/https://github.com/NuoFang6/nothing/raw/main/散线.txt"
    override:
      additional-suffix: "|禁止转发|散线"

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - 自动选择
      - 负载均衡
      - CFproxy
      - CFtrojan
      - LanCloud
      - 散线
    <<: *groupsSet

  - name: CFproxy
    type: select
    disable-udp: true
    use:
      - CFproxy
    <<: *groupsSet

  - name: CFtrojan
    type: select
    disable-udp: true
    use:
      - CFtrojan
    <<: *groupsSet

  - name: LanCloud
    type: select
    use:
      - LanCloud
    <<: *groupsSet

  - name: 散线
    type: select
    use:
      - 散线
    <<: *groupsSet

  - name: 自动选择
    type: url-test
    include-all: true
    tolerance: 35
    <<: *groupsSet

  - name: 负载均衡
    type: load-balance
    strategy: round-robin
    disable-udp: true
    filter: "HK|HKG|CMCC|VIP"
    use:
      - CFproxy
      - CFtrojan
    <<: *groupsSet
