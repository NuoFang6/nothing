mode: rule
ipv6: true
allow-lan: false
log-level: warning
find-process-mode: strict
disable-keep-alive: false #目前在android端强制为true
keep-alive-idle: 1665 # 链接闲置后 1665+15*9= 30 分钟关闭无效长链接
keep-alive-interval: 15
external-controller: 127.0.0.1:9090 # RESTful API 监听地址
secret: "@NuoFang" # 外部控制器RESTful API访问密钥
global-client-fingerprint: chrome
global-ua: "clash.meta/mihomo"
#
clash-for-android:
  append-system-dns: false
profile:
  store-selected: true
  store-fake-ip: true
tcp-concurrent: true
unified-delay: true
inbound-tfo: true
inbound-mptcp: true
geodata-mode: false # 不再使用 geo 规则集
geodata-loader: memconservative
geosite-matcher: mph
# geo-auto-update: true
# geo-update-interval: 12
# geox-url:
#   geosite: https://gh.nuofang.us.kg/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
#   geoip: https://gh.nuofang.us.kg/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat
# external-doh-server: /dns-query # 在RESTful API端口上开启DOH服务器，该URL不会验证secret
# external-ui: ./ui/ # WEB UI 目录，使用 http://127.0.0.1:9090/ui/xd 访问
# external-ui-name: xd
# external-ui-url: "https://gh.nuofang.us.kg/https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

tun:
  stack: system
  strict-route: true # 可能有bug
  auto-route: true
  auto-detect-interface: true
  endpoint-independent-nat: false
  dns-hijack:
    - any:53

hosts:
  # cf域名优选
