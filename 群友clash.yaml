dns:
  enable: true
  ipv6: true
  ipv6-timeout: 90
  use-hosts: true
  use-system-hosts: false
  respect-rules: false # 没用
  prefer-h3: true # https 协议先尝试quic
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - "quic://223.5.5.5"
    - "quic://223.6.6.6"
    # - "tls://1.12.12.12" # 垃圾腾讯
