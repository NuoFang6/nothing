inbound-tfo: true
inbound-mptcp: true
ipv6: true
geodata-mode: true
geosite-matcher: mph
geodata-loader: memconservative
find-process-mode: off
keep-alive-interval: 1800
global-client-fingerprint: random
global-ua: "clash.meta/mihomo"
tcp-concurrent: true
unified-delay: true
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: https://mirror.ghproxy.com/https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat
  geosite: https://mirror.ghproxy.com/https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat
profile:
  store-selected: true
  store-fake-ip: true
dns:
  enable: true
  ipv6: true
  use-hosts: false
  prefer-h3: false
  cache-algorithm: arc
  enhanced-mode: fake-ip
  default-nameserver:
    - quic://223.5.5.5#DIRECT
    - quic://223.6.6.6#DIRECT
  nameserver:
    - quic://223.5.5.5#DIRECT
    - quic://223.6.6.6#DIRECT
  proxy-server-nameserver:
    - quic://223.5.5.5
    - quic://223.6.6.6
  fallback:
    - https://dns.google/dns-query#PROXY&h3=false
  nameserver-policy:
    "+.openwrt.ai,+.mwm.moe,+.lizi.moe,+.alcy.cc":
      - quic://223.5.5.5#DIRECT
      - quic://223.6.6.6#DIRECT
    "+.msftconnecttest.com,+.msftncsi.com,+.bing.com,+.googleapis.cn":
      - https://dns.google/dns-query#PROXY&h3=false
  fallback-filter:
    geoip: false
    geoip-code: CN
    ipcidr:
      - 0.0.0.0/8
      - 10.0.0.0/8
      - 100.64.0.0/10
      - 127.0.0.0/8
      - 169.254.0.0/16
      - 172.16.0.0/12
      - 192.0.0.0/24
      - 192.0.2.0/24
      - 192.88.99.0/24
      - 192.168.0.0/16
      - 198.18.0.0/15
      - 198.51.100.0/24
      - 203.0.113.0/24
      - 224.0.0.0/4
      - 240.0.0.0/4
      - 255.255.255.255/32
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - localhost.ptlogin2.qq.com

sniffer:
  enable: true
  parse-pure-ip: true
  override-destination: true
  force-dns-mapping: false
  force-domain:
    - +.netflix.com
    - +.nflxvideo.net
    - +.amazonaws.com
    - +.media.dssott.com
  skip-domain:
    - "+.bing.com"
    - "+.copilot.microsoft.com"
    - "+.apple.com"
    - "+.io.mi.com"
    - "+.cdn-telegram.org"
    - "+.telegram.org"
    - "+.telegram-cdn.org"
    - "+.fragment.com"
    - "+.t.me"
    - "+.telegra.ph"
  sniff:
    HTTP:
      ports:
        - 80
        - 8080
        - 8880
        - 8088
        - 8888
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443

# 锚点
providerSet: &providerSet
  type: http
  interval: 86400
  proxy: DIRECT
  header:
    User-Agent:
      - "clash.meta/mihomo"
  health-check:
    enable: true
    url: https://www.youtube.com/generate_204
    interval: 300
    timeout: 4000
    lazy: true
    expected-status: 204
  override:
    skip-cert-verify: true
    up: 0

proxy-providers:
  CFproxy:
    <<: *providerSet
    url: "https://cfp.nuofang.filegear-sg.me/72cd3c7f-3cb9-40ec-b81e-1ef1e65baa47"
    override:
      additional-suffix: "|禁止转发|CFproxy"

  LanCloud:
    <<: *providerSet
    url: "https://lancloud.zichuanlan.top/api/v1/client/subscribe?token=ec318b460adb9700b4e2d68171e29ea4"
    override:
      additional-suffix: "|禁止转发|LanCloud"

  散线:
    <<: *providerSet
    url: "https://mirror.ghproxy.com/https://github.com/NuoFang6/nothing/raw/main/散线.txt"
    override:
      additional-suffix: "|禁止转发|散线"

proxies:
  - name: "诺芳CFserv00"
    type: vless
    server: vps.nuofang.filegear-sg.me
    port: 443
    udp: false
    uuid: nuofang
    tls: true
    client-fingerprint: random
    skip-cert-verify: true
    network: ws
    tfo: true
    mptcp: true
    ws-opts:
      path: /proxy?ed=2560
      headers:
        Host: vps.nuofang.filegear-sg.me

groupsSet: &groupsSet
  lazy: true
  url: https://www.youtube.com/generate_204
  interval: 300
  timeout: 4000
  expected-status: 204
  max-failed-times: 2
  tfo: true
  mptcp: true

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - 自动选择
      - CFproxy
      - LanCloud
      - 散线
    include-all: true
    <<: *groupsSet

  - name: CFproxy
    type: select
    use:
      - CFproxy
    <<: *groupsSet

  - name: LanCloud
    type: select
    use:
      - LanCloud
    <<: *groupsSet

  - name: 散线
    type: select
    use:
      - 散线
    <<: *groupsSet

  - name: 自动选择
    type: url-test
    include-all: true
    tolerance: 35
    <<: *groupsSet

rule-providers:
  AdRules:
    type: http
    url: https://adrules.top/adrules_domainset.txt
    format: text
    behavior: domain
    interval: 86400
    proxy: DIRECT

rules:
  - DOMAIN-SUFFIX,aeventlog.beacon.qq.com,REJECT-DROP
  - DOMAIN-SUFFIX,browser-intake-datadoghq.com,REJECT-DROP
  - DOMAIN-SUFFIX,dataflow.biliapi.com,REJECT-DROP
  - GEOIP,private,DIRECT,no-resolve
  - RULE-SET,AdRules,REJECT
  - DOMAIN-KEYWORD,ubisoft,DIRECT
  - DOMAIN-KEYWORD,icve,DIRECT
  - DOMAIN-KEYWORD,zhihuishu,DIRECT
  - DOMAIN-KEYWORD,shouqianba,DIRECT
  - DOMAIN-SUFFIX,mwm.moe,DIRECT
  - DOMAIN-SUFFIX,lizi.moe,DIRECT
  - DOMAIN-SUFFIX,alcy.cc,DIRECT
  - DOMAIN-SUFFIX,openwrt.ai,DIRECT
  - DOMAIN-SUFFIX,codelife.cc,DIRECT
  - DOMAIN-KEYWORD,gstatic,PROXY
  - DOMAIN-KEYWORD,tailscale,PROXY
  - DOMAIN-KEYWORD,visualstudio,PROXY
  - DOMAIN-KEYWORD,bing,PROXY
  - DOMAIN-KEYWORD,bard,PROXY
  - DOMAIN-KEYWORD,gemini,PROXY
  - DOMAIN-SUFFIX,googleapis.cn,PROXY
  - DOMAIN-SUFFIX,lmsys.org,PROXY
  - DOMAIN-SUFFIX,jsdelivr.net,PROXY
  - GEOSITE,cn,DIRECT
  - GEOIP,cn,DIRECT,no-resolve
  - NETWORK,UDP,REJECT
  # - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
  - MATCH,PROXY
